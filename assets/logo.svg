<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
      .linr-text {
        font-family: 'Space Grotesk', 'SF Pro Display', 'Helvetica Neue', sans-serif;
        font-weight: 700;
        font-size: 148px;
        letter-spacing: 18px;
      }
    </style>
  </defs>
  
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="#0A0A0A"/>
    
    <!-- Subtle grid texture -->
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <rect width="1" height="1" fill="rgba(255,255,255,0.015)"/>
    </pattern>
    <rect width="1024" height="1024" fill="url(#grain)"/>
    
    <!-- Decorative diagonal lines (very subtle) -->
    <line x1="0" y1="0" x2="1024" y2="1024" stroke="rgba(249,234,197,0.04)" stroke-width="1"/>
    <line x1="200" y1="0" x2="1224" y2="1024" stroke="rgba(249,234,197,0.03)" stroke-width="1"/>
    <line x1="-200" y1="0" x2="824" y2="1024" stroke="rgba(249,234,197,0.03)" stroke-width="1"/>
    
    <!-- Row 1 - far left, faded (decorative overflow) -->
    <text class="linr-text" x="-80" y="195" fill="rgba(249,234,197,0.25)">LINR</text>
    
    <!-- Row 2 -->
    <text class="linr-text" x="95" y="345" fill="rgba(255,255,255,0.35)">LINR</text>
    
    <!-- Row 3 - main visible row, offset right -->
    <text class="linr-text" x="270" y="495" fill="#F9EAC5" opacity="0.9">LINR</text>
    
    <!-- Row 4 - center hero -->
    <text class="linr-text" x="445" y="645" fill="#FFFFFF">LINR</text>

    <!-- Row 5 -->
    <text class="linr-text" x="620" y="795" fill="#F9EAC5" opacity="0.75">LINR</text>
    
    <!-- Row 6 - fading out -->
    <text class="linr-text" x="795" y="945" fill="rgba(255,255,255,0.3)">LINR</text>


    
    <!-- Vignette overlay -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.35)"/>
    </radialGradient>
    <rect width="1024" height="1024" fill="url(#vignette)"/>
  </g>
</svg>
